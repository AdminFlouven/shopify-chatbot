<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat 101 Other Level</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  #chat-toggle{position:fixed;bottom:24px;right:24px;z-index:99999;width:60px;height:60px;border-radius:50%;background:#000;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;transition:transform 0.2s}
  #chat-toggle:hover{transform:scale(1.08)}
  #chat-window{position:fixed;bottom:24px;right:24px;z-index:99999;width:400px;height:600px;max-height:85vh;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.18);display:none;flex-direction:column;background:#fff;border:1px solid #e5e7eb}
  #chat-window.open{display:flex}
  @media(max-width:440px){#chat-window{width:calc(100vw - 16px);right:8px;bottom:8px;height:calc(100vh - 16px);border-radius:16px}}
  .chat-close{position:absolute;top:14px;right:14px;background:rgba(0,0,0,0.05);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:background 0.15s}
  .chat-close:hover{background:rgba(0,0,0,0.1)}
  .chat-messages{flex:1;overflow-y:auto;padding:60px 20px 20px;background:#fff}
  .msg{display:flex;margin-bottom:16px;gap:10px;align-items:flex-start}
  .msg.user{flex-direction:row-reverse}
  .avatar{width:40px;height:40px;border-radius:50%;background:#000;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
  .avatar svg{width:26px;height:auto}
  .msg.user .avatar{background:#e5e7eb;color:#374151;font-size:11px;font-weight:700;letter-spacing:0.5px}
  .msg-content{max-width:75%;display:flex;flex-direction:column}
  .msg.user .msg-content{align-items:flex-end}
  .msg-bubble{background:#f3f4f6;color:#111827;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
  .msg.user .msg-bubble{background:#000;color:#fff}
  .msg-time{font-size:11px;color:#9ca3af;margin-top:4px;font-weight:600;padding:0 4px}
  .typing{background:#f3f4f6;padding:12px 16px;border-radius:14px;display:flex;gap:4px;align-items:center;width:fit-content}
  .typing span{width:7px;height:7px;border-radius:50%;background:#9ca3af;animation:bounce 1.2s ease-in-out infinite}
  .typing span:nth-child(2){animation-delay:0.15s}
  .typing span:nth-child(3){animation-delay:0.3s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.5}30%{transform:translateY(-6px);opacity:1}}
  .quick-actions{padding:8px 20px 12px;display:flex;flex-wrap:wrap;gap:6px;background:#fff}
  .quick-btn{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:7px 14px;font-size:13px;cursor:pointer;color:#374151;transition:all 0.15s;white-space:nowrap;font-family:inherit}
  .quick-btn:hover{background:#000;color:#fff;border-color:#000}
  .chat-input-area{padding:14px 16px 16px;border-top:1px solid #f3f4f6;display:flex;gap:8px;align-items:center;background:#fff}
  .chat-input-area input{flex:1;border:1px solid #e5e7eb;border-radius:24px;padding:11px 16px;font-size:14px;outline:none;background:#f9fafb;color:#111827;font-family:inherit;transition:border-color 0.15s}
  .chat-input-area input:focus{border-color:#000;background:#fff}
  .send-btn{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
  .send-btn.active{background:#000}
  .send-btn.active:hover{transform:scale(1.05)}
  .send-btn.inactive{background:#e5e7eb;cursor:default}
</style>
</head>
<body>
<button id="chat-toggle" onclick="toggleChat()">
  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</button>
<div id="chat-window">
  <button class="chat-close" onclick="toggleChat()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="quick-actions" id="quick-actions">
    <button class="quick-btn" onclick="sendQuick('¿Qué me recomiendas para una maratón?')">🏃 Maratón</button>
    <button class="quick-btn" onclick="sendQuick('¿Tenéis algo para los calambres?')">⚡ Calambres</button>
    <button class="quick-btn" onclick="sendQuick('¿Cuánto tarda el envío?')">📦 Envíos</button>
    <button class="quick-btn" onclick="sendQuick('Estoy buscando geles energéticos')">🎯 Geles</button>
  </div>
  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="Escribe tu mensaje..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="send-btn inactive" id="send-btn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>
<script>
const API_URL="/api/chat";
const MAX_MESSAGES=20;
let messages=[],isLoading=false,hasStarted=false;

const LOGO_101='<svg xmlns="http://www.w3.org/2000/svg" viewBox="739 397 460 194" fill="#fff"><path d="M739.8,590.49v-27.96h55.92v-126.1c0-3.17-1.54-6.29-4.61-9.37-3.08-3.07-6.2-4.61-9.37-4.61h-27.96v-27.96h27.96c10.81,0,20.5,4.29,29.08,12.86,8.57,8.58,12.86,18.27,12.86,29.08v126.1h55.92v27.96h-139.8Z"/><path d="M1074.75,590.49v-27.96h55.92v-126.1c0-3.17-1.54-6.29-4.61-9.37-3.08-3.07-6.2-4.61-9.37-4.61h-27.96v-27.96h27.96c10.81,0,20.5,4.29,29.08,12.86,8.57,8.58,12.86,18.27,12.86,29.08v126.1h55.92v27.96h-139.8Z"/><path d="M907.27,548.42v-68.4l27.96,27.68v40.72c0,3.17,1.54,6.29,4.61,9.37,3.08,3.08,6.2,4.61,9.37,4.61h55.92c5.59,0,9.88-3.07,12.86-9.23l-82.76-82.76-27.96-27.68v-6.15c0-10.63,4.28-20.23,12.86-28.8,8.76-8.76,18.45-13.14,29.08-13.14h55.92c10.81,0,20.5,4.29,29.08,12.86,8.57,8.58,12.86,18.27,12.86,29.08v68.4l-27.96-27.68v-40.72c0-3.17-1.54-6.29-4.61-9.37-3.07-3.07-6.2-4.61-9.37-4.61h-55.92c-5.59,0-9.88,3.17-12.86,9.51l82.76,82.48,27.96,27.68v6.15c0,10.82-4.29,20.5-12.86,29.08-8.39,8.58-18.08,12.86-29.08,12.86h-55.92c-11,0-20.79-4.28-29.36-12.86-8.39-8.58-12.58-18.26-12.58-29.08Z"/></svg>';

function currentTime(){
  const d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

function toggleChat(){
  const w=document.getElementById("chat-window"),t=document.getElementById("chat-toggle"),o=w.classList.toggle("open");
  t.style.display=o?"none":"flex";
  if(o){
    if(!hasStarted){
      addMessage("bot","¡Hola! ¿Cómo puedo ayudarte?");
      hasStarted=true;
    }
    document.getElementById("chat-input").focus();
  }
}

function addMessage(role,text){
  const c=document.getElementById("chat-messages");
  const div=document.createElement("div");
  div.className=`msg ${role==="user"?"user":"bot"}`;
  const avatarContent=role==="user"?"TÚ":LOGO_101;
  div.innerHTML=`
    <div class="avatar">${avatarContent}</div>
    <div class="msg-content">
      <div class="msg-bubble">${escapeHtml(text)}</div>
      <div class="msg-time">${currentTime()}</div>
    </div>
  `;
  c.appendChild(div);
  c.scrollTop=c.scrollHeight;
}

function escapeHtml(t){
  const d=document.createElement("div");
  d.textContent=t;
  return d.innerHTML.replace(/\n/g,"<br>");
}

function showTyping(){
  const c=document.getElementById("chat-messages");
  const div=document.createElement("div");
  div.id="typing";
  div.className="msg bot";
  div.innerHTML=`
    <div class="avatar">${LOGO_101}</div>
    <div class="msg-content"><div class="typing"><span></span><span></span><span></span></div></div>
  `;
  c.appendChild(div);
  c.scrollTop=c.scrollHeight;
}

function hideTyping(){
  const e=document.getElementById("typing");
  if(e)e.remove();
}

function updateSendBtn(){
  const b=document.getElementById("send-btn"),i=document.getElementById("chat-input");
  b.className=i.value.trim()?"send-btn active":"send-btn inactive";
}

document.getElementById("chat-input").addEventListener("input",updateSendBtn);

function sendQuick(t){
  document.getElementById("quick-actions").style.display="none";
  document.getElementById("chat-input").value=t;
  sendMessage();
}

async function sendMessage(){
  const input=document.getElementById("chat-input");
  const text=input.value.trim();
  if(!text||isLoading)return;
  document.getElementById("quick-actions").style.display="none";
  isLoading=true;
  input.value="";
  updateSendBtn();
  addMessage("user",text);
  messages.push({role:"user",content:text});
  if(messages.length>MAX_MESSAGES)messages=messages.slice(-MAX_MESSAGES);
  showTyping();
  try{
    const res=await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages})
    });
    const data=await res.json();
    hideTyping();
    const reply=data.reply||"Lo siento, no pude procesar tu solicitud. ¿Podrías intentar de nuevo?";
    addMessage("bot",reply);
    messages.push({role:"assistant",content:reply});
  }catch(err){
    hideTyping();
    addMessage("bot","Hubo un error de conexión. Por favor intenta de nuevo.");
    console.error(err);
  }finally{
    isLoading=false;
    input.focus();
  }
}
</script>
</body>
</html>
